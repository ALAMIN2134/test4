<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mark Attendance - Smart Attendance System</title>

  <!-- Tailwind for quick styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <!-- NAVBAR: identical to index.html -->
  <nav class="bg-indigo-700 shadow-lg sticky top-0 z-50" role="navigation" aria-label="Main Navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex-shrink-0 flex items-center">
          <span class="site-logo text-white text-xl">Smart Attendance System</span>
        </div>

        <div class="hidden md:block">
          <div class="ml-10 flex items-baseline space-x-4">
            <a id="nav-dashboard" href="index.html" data-nav class="text-white hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">Dashboard</a>
            <a id="nav-reports" href="#" data-nav class="text-white hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">Reports</a>
            <a href="mark-attendance.html" class="text-white hover:bg-indigo-600 block px-3 py-2 rounded-md text-base font-medium">Mark Attendance</a>
            <a id="nav-students" href="#" data-nav class="text-white hover:bg-indigo-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">Student List</a>
          </div>
        </div>

        <!-- USER area (same as index.html) -->
        <div class="flex items-center space-x-4">
          <div id="nav-user" class="relative"></div>
          <div class="-mr-2 flex md:hidden">
            <button id="mobile-menu-button" class="inline-flex items-center justify-center p-2 rounded-md text-indigo-200 hover:text-white hover:bg-indigo-600 focus:outline-none">
              <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Mobile menu (full version, like index.html) -->
    <div class="md:hidden hidden" id="mobile-menu">
  <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
    <a href="index.html" data-nav class="text-white hover:bg-indigo-600 block px-3 py-2 rounded-md text-base font-medium">Dashboard</a>
    <a href="#" data-nav class="text-white hover:bg-indigo-600 block px-3 py-2 rounded-md text-base font-medium">Reports</a>
    <a href="mark-attendance.html" data-nav class="text-white hover:bg-indigo-600 block px-3 py-2 rounded-md text-base font-medium">Mark Attendance</a>
    <a href="#" data-nav class="text-white hover:bg-indigo-600 block px-3 py-2 rounded-md text-base font-medium">Student List</a>
  </div>
</div>
  </nav>
  <!-- END NAVBAR -->

  <!-- Page content -->
  <main class="page-inner p-4 md:p-8">
    <div class="card-base card-top-blue mt-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">Mark Attendance</h1>
        <div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-lg inline-block font-medium">
          <span id="class-header">CSE210 • Data Structure</span>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <p class="stat-label">Present</p>
          <p id="present-count" class="stat-value present-value">0</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Absent</p>
          <p id="absent-count" class="stat-value absent-value">30</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Total</p>
          <p id="total-count" class="stat-value">30</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Attendance %</p>
          <p id="attendance-percent" class="stat-value percent-value">0.0%</p>
        </div>
      </div>

      <div id="student-grid" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-3 md:gap-4 mb-10" aria-live="polite">
        <!-- Tiles generated by JS -->
      </div>

      <div class="flex flex-col sm:flex-row justify-center gap-4 pt-4 border-t border-gray-100">
        <button id="reset-button" type="button" class="flex items-center justify-center space-x-2 px-6 py-3 bg-gray-200 text-gray-700 font-semibold rounded-xl shadow-md hover:bg-gray-300 transition w-full sm:w-auto">
          <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
          <span>Reset Session</span>
        </button>

        <button id="save-button" type="button" class="flex items-center justify-center space-x-2 px-6 py-3 bg-violet-600 text-white font-semibold rounded-xl shadow-lg hover:bg-violet-700 transition w-full sm:w-auto">
          <i data-lucide="save" class="w-5 h-5"></i>
          <span>Confirm & Save Attendance</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Success Modal -->
  <div id="success-modal" class="fixed inset-0 bg-gray-900 bg-opacity-70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 text-center" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i data-lucide="check-circle" class="text-green-600 w-8 h-8"></i>
      </div>
      <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">Attendance Saved!</h3>
      <p class="text-gray-600 mb-6">All attendance records have been saved successfully.</p>
      <button id="modal-close-button" type="button" class="px-6 py-2.5 bg-violet-600 text-white font-semibold rounded-xl hover:bg-violet-700 transition">
        Back to Dashboard
      </button>
    </div>
  </div>

  <!-- Scripts (same order as index.html) -->
  <script src="assets/js/navbar.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/mark-attendance.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
</body>
</html>
